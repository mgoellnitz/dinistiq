#
# Environment variables needed:
# OSS_INDEX_USER
# OSS_INDEX_TOKEN
# SIGNING_KEY_FILE
# SIGNING_KEY
# SIGNING_PASSWORD
# COVERALLS_REPO_TOKEN
# PUBLICATION_USER
# PUBLICATION_TOKEN
#
name: Build Dinistiq

on:
  push:
    tags: [ '*' ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Gradle
      run: |
        cat <(echo -e "${{ secrets.SIGNING_KEY_FILE }}") | gpg --dearmor > key.gpg
        ./gradlew -PossindexUser=${{secrets.OSS_INDEX_USER}} -PossindexToken=${{secrets.OSS_INDEX_TOKEN}} -Psigning.keyId=${{secrets.SIGNING_KEY}} -Psigning.password=${{secrets.SIGNING_PASSWORD}} -Psigning.secretKeyRingFile=key.gpg -Pgh.user=${{vars.PUBLICATION_USER}} -Pgh.token=${{secrets.PUBLICATION_TOKEN}} build sign publishAllPublicationsToGitHubRepository
      env:
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
