#
# Environment variables needed:
# PUBLICATION_KEY_FILE
# PUBLICATION_KEY
# PUBLICATION_PASSWORD
# CODEBERG_USER
# CODEBERG_TOKEN
#
name: Build Dinistiq

on:
  push:
    tags: [ '*' ]

jobs:
  build:

    runs-on: provocon
    container:
      image: debian:stable-slim

    steps:
      - name: Prepare Tools
        run: apt update ; apt install -yq nodejs

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: https://github.com/actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          cat <(echo -e "${{ secrets.PUBLICATION_KEY_FILE }}") | gpg --dearmor > key.gpg
          ./gradlew -Ptag -PossindexUser=${{secrets.OSS_INDEX_USER}} -PossindexToken=${{secrets.OSS_INDEX_TOKEN}} -Psigning.keyId=${{secrets.PUBLICATION_KEY}} -Psigning.password=${{secrets.PUBLICATION_PASSWORD}} -Psigning.secretKeyRingFile=key.gpg -Pcb.user=${{vars.CODEBERG_USER}} -Pcb.token=${{secrets.CODEBERG_TOKEN}} build sign publishAllPublicationsToCodebergRepository
