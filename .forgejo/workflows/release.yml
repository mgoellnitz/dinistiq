name: Build Dinistiq

on:
  push:
    tags: [ '*' ]

jobs:
  build:

    runs-on: provocon
    container:
      image: debian:stable-slim

    steps:
      - name: Prepare Tools
        run: apt update ; apt install -yq nodejs

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 11
        uses: https://github.com/actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: https://github.com/gradle/actions/setup-gradle@v5

      - name: Build with Gradle
        run: |
          ./gradlew -PossindexUser=${{secrets.OSS_INDEX_USER}} -PossindexToken=${{secrets.OSS_INDEX_TOKEN}} jacocoTestReport audit build generatePomFileForCustomizedGeneratedArtifactsPublication sign
          ./gradlew -PossindexUser=${{secrets.OSS_INDEX_USER}} -PossindexToken=${{secrets.OSS_INDEX_TOKEN}} coverallsJacoco
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
