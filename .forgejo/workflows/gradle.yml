# Environment variables needed:
# OSS_INDEX_USER
# OSS_INDEX_TOKEN
# SIGNING_KEY_FILE
# SIGNING_KEY
# SIGNING_PASSWORD
#
name: Build Dinistiq

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: provocon
    container:
      image: debian:stable-slim

    steps:
      - name: Prepare Tools
        run: apt update ; apt install -yq gnupg nodejs

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: https://github.com/actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: https://github.com/gradle/actions/setup-gradle@v5

      - name: Build with Gradle
        run: |
          cat <(echo -e "${{ secrets.SIGNING_KEY_FILE }}") | gpg --dearmor > key.gpg
          ./gradlew -PossindexUser=${{secrets.OSS_INDEX_USER}} -PossindexToken=${{secrets.OSS_INDEX_TOKEN}} -Psigning.keyId=${{secrets.SIGNING_KEY}} -Psigning.password=${{secrets.SIGNING_PASSWORD}} -Psigning.secretKeyRingFile=key.gpg jacocoTestReport audit sign
          ./gradlew -PossindexUser=${{secrets.OSS_INDEX_USER}} -PossindexToken=${{secrets.OSS_INDEX_TOKEN}} generatePomFileForCustomizedGeneratedArtifactsPublication
