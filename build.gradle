import groovy.util.Node;
import org.gradle.api.tasks.compile.AbstractCompile

plugins {
  // id 'net.saliman.cobertura' version '4.0.0' - breaks audit with oldish references
  id 'com.github.nbaztec.coveralls-jacoco' version '1.2.20'
  id 'net.ossindex.audit' version '0.4.11'
  id 'io.franzbecker.gradle-lombok' version '5.0.0'
  id 'signing'
}
apply plugin: 'java'
apply plugin: 'jacoco'
apply plugin: 'maven-publish'
apply plugin: 'pmd'

defaultTasks 'clean', 'build'

println "Gradle: ${gradle.gradleVersion}"

def suffix = project.hasProperty('tag')?'':'-SNAPSHOT'
version = "0.9$suffix"

if (project.hasProperty('jdk')) {
  def bootstripClasspathStr = "${jdk}/jre/lib/rt.jar"
  project.tasks.withType(AbstractCompile, { AbstractCompile ac ->
      ac.options.bootstripClasspath = files(bootstripClasspathStr)
    })
}

java {
  sourceCompatibility = 11
  targetCompatibility = 11
}

repositories {
  mavenCentral()
}

configurations {
  optional
  implementation.extendsFrom optional
}

lombok {
  version = "1.18.42"
  sha256 = ""
}

dependencies {
  implementation 'org.slf4j:slf4j-api:2.0.17'
  implementation 'javax.inject:javax.inject:1'
  implementation 'jakarta.annotation:jakarta.annotation-api:2.1.1'

  optional 'jakarta.servlet:jakarta.servlet-api:5.0.0'

  testImplementation 'jakarta.servlet:jakarta.servlet-api:5.0.0'
  testImplementation 'org.testng:testng:7.12.0'
  // Some servlet API elements
  testImplementation 'org.mockito:mockito-core:5.22.0'
  // integrate tck into unit tests
  testImplementation 'javax.inject:javax.inject-tck:1'
  // inject-tck introduces a vulnerability, which needs this dependency override:
  testImplementation 'junit:junit:4.13.2'
  // tests are logging at debug level through special logback.xml
  testRuntimeOnly 'ch.qos.logback:logback-classic:1.5.32'
}

pmd {
  ruleSets = []
  ruleSetFiles = files('pmd.xml')
  toolVersion = '7.22.0'
}

test {
  useTestNG() {
  }
}

audit {
  // PMD still references this one - so please update PMD once it is possible
  ignore = [ 'com.beust:jcommander:1.48' ]
  user   = "$ossindexUser"
  token  = "$ossindexToken"
}

jacocoTestReport {
  reports {
    xml.required = true // coveralls plugin depends on xml format report
    html.required = true
  }
}

jacoco {
  toolVersion = '0.8.14'
}

// Triggers some unit test elements
tasks.withType(Test) {
  systemProperty 'firstUrl', 'http://user:password@codeberg.org:80/'
  systemProperty 'secondUrl', 'http://:password@codeberg.org'
  systemProperty 'thirdUrl', 'x://:800'
  systemProperty 'firstNonUrl', '://:80'
  systemProperty 'secondNonUrl', 'x://:'
}

tasks.withType(JavaCompile) {
    options.compilerArgs << '-Xlint:unchecked'
    options.deprecation = true
}

// maven artifact publication stuff
task sourcesJar(type: Jar, dependsOn: classes) {
  archiveClassifier = 'sources'
  from sourceSets.main.allSource
}

task javadocJar(type: Jar, dependsOn: javadoc) {
  archiveClassifier = 'javadoc'
  from "${buildDir}/docs/javadoc"
}

tasks.named("assemble") {
  dependsOn(javadocJar, sourcesJar)
}

var gitlabUser = 'Job-Token'
var gitlabToken = System.getenv("CI_JOB_TOKEN")
if (gitlabToken == null) {
  gitlabUser = 'Private-Token'
  gitlabToken = System.getenv("GITLAB_COM_TOKEN")
}

publishing {
  publications {
    customizedGeneratedArtifacts(MavenPublication) {
      pom.withXml {
        def rootNode = asNode()
        rootNode.children().get(3).plus {
          new Node(rootNode, 'name', 'dinistiq')
          new Node(rootNode, 'description', 'JSR 330 based Java minimal footprint Dependency Injection framework')
          new Node(rootNode, 'url', 'https://mgoellnitz.github.io/dinistiq/')
          def license = new Node(rootNode, 'licenses').appendNode('license')
          license.appendNode('name', 'LGPL-3.0')
          license.appendNode('url', 'https://opensource.org/license/LGPL-3.0')
          license
          def issues = new Node(rootNode, 'issueManagement')
          issues.appendNode('system', 'github')
          issues.appendNode('url', 'https://codeberg.org/backendzeit/dinistiq/issues')
          issues
          def scm = new Node(rootNode, 'scm')
          scm.appendNode('connection', 'scm:git:git@codeberg.org:backendzeit/dinistiq.git')
          scm.appendNode('developerConnection', 'scm:git:git@codeberg.org:backendzeit/dinistiq.git')
          scm.appendNode('url', 'https://codeberg.org/backendzeit/dinistiq.git')
          def developer = rootNode.appendNode('developers').appendNode('developer')
          developer.appendNode('name', 'Martin Goellnitz')
          developer.appendNode('organization', 'Provocon')
          developer.appendNode('organizationUrl', 'http://www.provocon.de/')
          developer
        }
        rootNode.dependencies.dependency.findAll { xmlDep ->
          // mark optional dependencies
          if ( project.configurations.optional.allDependencies.findAll { dep ->
              xmlDep.groupId.text() == dep.group && xmlDep.artifactId.text() == dep.name
            } ) {
            def xmlOptional = xmlDep.optional[ 0 ];
            if ( !xmlOptional ) {
              xmlOptional = xmlDep.appendNode( 'optional' )
            }
            xmlOptional.value = 'true';
          }

          // fix maven-publish issue when all maven dependencies are placed into runtime scope
          if ( project.configurations.implementation.allDependencies.findAll { dep ->
              xmlDep.groupId.text() == dep.group && xmlDep.artifactId.text() == dep.name
            } ) {
            def xmlScope = xmlDep.scope[ 0 ];
            if ( !xmlScope ) {
              xmlScope = xmlDep.appendNode( 'scope' )
            }
            xmlScope.value = 'compile';
          }
        }
      }
      groupId = 'dinistiq'
      from components.java
      artifact sourcesJar
      artifact javadocJar
    }
  }
  repositories {
    maven {
      name "Codeberg"
      url "https://codeberg.org/api/packages/backendzeit/maven"
      credentials {
        username = project.findProperty("cb.user")  ?: System.getenv("CODEBERG_USER")
        password = project.findProperty("cb.token") ?: System.getenv("CODEBERG_TOKEN")
      }
    }
    maven {
      name "GitLab"
      url "https://gitlab.com/api/v4/projects/1966640/packages/maven"
      credentials(HttpHeaderCredentials) {
        name = gitlabUser
        value = gitlabToken
      }
      authentication {
        header(HttpHeaderAuthentication)
      }
    }
    maven {
      name "GitHub"
      url "https://maven.pkg.github.com/mgoellnitz/dinistiq"
      credentials {
        username = project.findProperty("gh.user")  ?: System.getenv("GITHUB_COM_USER")
        password = project.findProperty("gh.token") ?: System.getenv("GITHUB_COM_TOKEN")
      }
    }
  }
}

signing {
  sign publishing.publications.customizedGeneratedArtifacts
}
